---
layout: default
---

<article class="content-page article-page">
  <header class="page-header">
    {% if page.date %}
      <p class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}</p>
    {% endif %}
    <h1>{{ page.title | markdownify | strip_html }}</h1>
    {% if page.excerpt %}
      <p class="page-header__summary">{{ page.excerpt | markdownify | strip_html }}</p>
    {% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
